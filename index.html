<style>
  :root{--sea:#0B5E8A;--coral:#E8662A;--navy:#143A4E;--amber:#EF9F27;--bg:#f7f8f9;--line:#e4e8eb;--muted:#5f6b78;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--navy);font-family:'Inter',system-ui,sans-serif;line-height:1.55;}
  .wrap{max-width:720px;margin:0 auto;padding:0 18px 64px;}
  header.site{background:#fff;border-bottom:1px solid var(--line);position:relative;}

  .hdrpills{margin-left:auto;display:inline-flex;flex-direction:column;align-items:center;z-index:200}.pillrow{display:flex;gap:10px;align-items:flex-start;}.mleswrap{position:relative;display:inline-flex;flex-direction:column;align-items:center;}
  .mlesreq{text-decoration:none;color:#fff;background:var(--coral);padding:7px 18px;border-radius:9px;white-space:nowrap;display:flex;flex-direction:column;align-items:center;line-height:1.12;text-align:center;}

  .mr-cap{font-size:9px;font-weight:500;color:var(--navy);opacity:.7;letter-spacing:.3px;margin-top:3px;max-width:178px;line-height:1.3;text-align:center}

  .mlespop p{margin:0;font-size:12.5px;line-height:1.55;color:#2f3b46;font-weight:400}
  .mlespop b{font-weight:700;color:var(--navy)}

  .cmain{flex:1;min-width:0;} .meta{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
  .act{font-size:16px;font-weight:600;margin:3px 0 5px;color:var(--navy);} .why{font-size:13.5px;color:#36434f;margin:0;}

  .pill{font-size:12px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap;}

  .su-head{font-family:'Anton',sans-serif;font-size:18px;letter-spacing:.4px;color:var(--navy);}

  .footnav{display:flex;align-items:center;justify-content:center;gap:18px;flex-wrap:wrap;margin-bottom:12px;}

  .footnav .fsoc{display:inline-flex;gap:9px;}

  .footnav .fsoc a:hover{background:var(--sea);}

  .langpick{display:flex;flex-wrap:wrap;gap:10px;margin:30px 0;}
  .langpick a{text-decoration:none;color:var(--sea);border:1px solid var(--line);border-radius:10px;padding:12px 18px;font-weight:600;font-size:15px;background:#fff;}
  .langpick a:hover{border-color:var(--sea);}

  /* Gutter ad squares — desktop only, shown when the viewport is wide enough to clear the 720px column */
  .ad-rail{position:fixed;top:152px;width:250px;z-index:5;display:none;flex-direction:column;}
  .ad-rail.left{left:calc((100vw - 720px) / 2 - 278px);transform-origin:top left;}
  .ad-rail.right{right:calc((100vw - 720px) / 2 - 278px);transform-origin:top right;}
  .ad-slot{display:flex;align-items:center;justify-content:center;width:250px;height:250px;border-radius:10px;overflow:hidden;text-decoration:none;background:#fff;border:1px solid var(--line);box-shadow:0 1px 3px rgba(20,58,78,.06);}
  .ad-slot img{max-width:100%;max-height:100%;object-fit:contain;padding:18px;}
  .ad-slot.house{flex-direction:column;gap:7px;text-align:center;padding:18px;border:2px dashed var(--coral);background:#FAECE7;box-shadow:none;}
  .ad-slot.house .ah-txt{font-size:14px;font-weight:600;color:#993C1D;}
  .ad-slot.house .ah-cta{font-size:11.5px;font-weight:600;color:#993C1D;opacity:.85;}

  .ad-slot.text .ad-sub{font-size:12px;font-weight:500;color:#993C1D;}

  .ad-slot.creative.center{align-items:center;text-align:center;justify-content:center;gap:8px;}

  .ad-slot.creative .ad-sub{display:block;font-size:12px;font-weight:500;line-height:1.3;opacity:.96;margin-top:4px;text-shadow:0 1px 8px rgba(0,0,0,.8);}

  .ad-slot.creative .ad-cta{display:block;align-self:stretch;text-align:center;background:#fff;color:#0B5E8A;border-radius:8px;padding:8px;font-size:12px;font-weight:700;margin-top:8px;box-shadow:0 3px 12px rgba(0,0,0,.3);}

  .ad-slot.creative .ad-rib{position:absolute;top:0;left:0;background:var(--coral);color:#fff;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 11px;border-radius:0 0 7px 0;z-index:2;}
  .ad-slot.creative .ad-credit{position:absolute;right:6px;bottom:5px;font-size:7.5px;font-weight:500;opacity:.62;letter-spacing:.2px;text-shadow:0 1px 4px rgba(0,0,0,.9);z-index:2;}
  .ad-slot.creative.logo{align-items:center;justify-content:space-between;text-align:center;}
  .ad-slot.creative .ad-logo-wrap{flex:1;display:flex;align-items:center;justify-content:center;width:100%;min-height:0;}

  .ad-slot.creative .ad-foot-grp{width:100%;}
  .ad-slot.creative.light{color:#8a5a3c;}
  .ad-slot.creative.light .ad-sub{color:#9a6b45;opacity:1;text-shadow:none;font-weight:600;letter-spacing:.5px;}
  .ad-slot.creative.light .ad-cta{background:#b9794a;color:#fff;border:0;box-shadow:none;}
  .ad-slot.creative.light .ad-logo{max-height:140px;filter:none;}
  .info-card{flex:1;margin-top:16px;background:#fff;border:1px solid var(--line);border-left:4px solid var(--coral);border-radius:12px;padding:12px 15px;box-shadow:0 2px 8px rgba(20,58,78,.07);display:flex;flex-direction:column;justify-content:center;text-decoration:none;}
  .info-card .info-eyebrow{display:block;font-size:10px;font-weight:700;letter-spacing:1.6px;text-transform:uppercase;color:#993C1D;}
  .info-card .info-body{display:block;font-size:13px;line-height:1.4;color:var(--navy);font-weight:500;margin-top:6px;}
  .talsq-ttl{align-self:flex-start;}
  .talsq-main{font-family:'Anton',sans-serif;font-size:26px;letter-spacing:1.5px;color:var(--navy);line-height:1;display:flex;align-items:center;justify-content:center;gap:9px;}
  .talsq-main .sq{color:var(--coral);} .talsq-main .gstar{flex:none;}
  .talsq-sub{font-size:9px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:#993C1D;margin:6px 0 0;text-align:center;}
  .talsq-feat{font-size:10.5px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--navy);margin:11px 0 8px;text-align:center;width:250px;}
  .talsq{position:relative;width:250px;height:250px;flex:none;border-radius:16px;overflow:hidden;color:#fff;background-size:cover;background-position:center;box-shadow:0 8px 22px rgba(20,58,78,.22);}
  .talsq.invite{background:radial-gradient(85% 60% at 50% 6%,rgba(255,230,170,.85),rgba(232,102,42,.35) 38%,rgba(0,0,0,0) 70%),linear-gradient(170deg,#5a1d6e,#1a0820);}

  .talsq .tfg{position:relative;z-index:3;height:100%;padding:18px;display:flex;flex-direction:column;justify-content:space-between;box-sizing:border-box;}
  .talsq .thd{display:block;font-family:'Anton',sans-serif;font-size:33px;line-height:1.0;text-shadow:0 2px 16px rgba(0,0,0,.55);}
  .talsq .tsb{display:block;font-size:12.5px;line-height:1.34;margin-top:6px;text-shadow:0 1px 8px rgba(0,0,0,.85);}
  .talsq .tbtn{display:flex;align-items:center;justify-content:center;gap:7px;background:#fff;color:#7a1f5f;border-radius:9px;padding:10px;font-size:12.5px;font-weight:700;text-decoration:none;}

  /* Málaga Live TV — 16:9 feature, rotates through upcoming acts; click-to-play (no autoload) */
  .mltv{background:var(--navy);border-radius:14px;padding:16px 16px 14px;margin:14px 0 6px;}
  .mltv-head{display:flex;align-items:flex-start;gap:10px;font-family:'Anton',sans-serif;font-size:16px;letter-spacing:.6px;color:#fff;}
  .mltv-sub{font-family:'Inter',sans-serif;font-weight:500;font-size:12px;letter-spacing:.4px;color:var(--amber);text-transform:uppercase;text-align:center;margin:0 0 3px;}
  .mltv-inner{max-width:520px;margin:14px auto 0;}

  .mltv-dot{width:9px;height:9px;border-radius:50%;background:#E8662A;animation:mlpulse 1.8s infinite;margin-top:13px;}
  .mltv-pres{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);display:flex;flex-direction:row;align-items:flex-end;gap:9px;text-decoration:none;font-family:'Inter',sans-serif;}

  .mltv-pres img{max-height:64px;max-width:200px;width:auto;height:auto;object-fit:contain;display:block;}
