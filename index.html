<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Málaga Live — Concerts & Festivals</title>
<meta name="description" content="The pulse of concerts & festivals in Málaga city & Costa del Sol — in 8 languages.">

<link rel="alternate" hreflang="en" href="https://malagalivepulse.com/en/">

<link rel="alternate" hreflang="de" href="https://malagalivepulse.com/de/">

<style>
  :root{--sea:#0B5E8A;--coral:#E8662A;--navy:#143A4E;--amber:#EF9F27;--bg:#f7f8f9;--line:#e4e8eb;--muted:#5f6b78;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--navy);font-family:'Inter',system-ui,sans-serif;line-height:1.55;}
  .wrap{max-width:840px;margin:0 auto;padding:0 18px 64px;}
  header.site{background:#fff;border-bottom:1px solid var(--line);}
  .head-in{max-width:840px;margin:0 auto;padding:22px 18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
  .badge{width:56px;height:56px;border-radius:13px;background:var(--sea);display:flex;align-items:center;justify-content:center;flex:none;}
  .wm{font-family:'Anton',sans-serif;font-size:38px;letter-spacing:1px;line-height:1;}
  .tagline{flex-basis:100%;font-size:12.5px;font-weight:500;letter-spacing:1.5px;color:var(--navy);text-transform:uppercase;margin-top:2px;}
  .subbar{display:flex;gap:14px;align-items:center;flex-wrap:wrap;padding:16px 0 6px;border-bottom:1px solid var(--line);margin-bottom:8px;}
  .count{font-family:'Anton',sans-serif;font-size:15px;letter-spacing:.5px;color:var(--sea);}
  .controls{margin-left:auto;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  select{font-family:inherit;font-size:13px;border:1px solid var(--line);border-radius:8px;padding:7px 10px;background:#fff;color:var(--navy);cursor:pointer;}
  label.chk{font-size:13px;display:inline-flex;align-items:center;gap:6px;cursor:pointer;color:var(--muted);}
  h2.day{font-family:'Anton',sans-serif;font-weight:400;font-size:20px;letter-spacing:.5px;color:var(--navy);margin:26px 0 10px;padding-bottom:6px;border-bottom:2px solid var(--coral);}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin:8px 0;display:flex;gap:14px;align-items:flex-start;}
  .card.isfree{background:#fbfdf8;border-color:#dce8cf;}
  .cmain{flex:1;min-width:0;} .meta{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
  .act{font-size:16px;font-weight:600;margin:3px 0 5px;color:var(--navy);} .why{font-size:13.5px;color:#36434f;margin:0;}
  .cside{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex:none;}
  .pill{font-size:12px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap;}
  .pill.price{background:#eaf1f7;color:var(--sea);} .pill.free{background:#e6f3d8;color:#3b6d11;}
  .btn{font-size:13px;font-weight:600;text-decoration:none;color:#fff;background:var(--coral);padding:7px 13px;border-radius:8px;white-space:nowrap;}
  .btn:hover{background:#cf551f;}
  .signup{background:#fff;border:1px solid var(--line);border-left:4px solid var(--coral);border-radius:12px;padding:18px 20px;margin:14px 0 4px;}
  .su-head{font-family:'Anton',sans-serif;font-size:18px;letter-spacing:.4px;color:var(--navy);margin-bottom:10px;}
  .su-form{margin:0;}
  .su-row{display:flex;gap:8px;flex-wrap:wrap;}
  .su-row input{flex:1;min-width:200px;font-size:14px;padding:10px 12px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--navy);}
  .su-row button{font-size:14px;font-weight:600;color:#fff;background:var(--coral);border:0;border-radius:8px;padding:10px 18px;cursor:pointer;}
  .su-row button:hover{background:#cf551f;}
  .su-note{font-size:11.5px;color:var(--muted);margin-top:8px;}
  .su-ok{font-size:14px;font-weight:600;color:#3b6d11;margin-top:8px;}
  .su-frame{display:none;}
  footer{margin-top:36px;padding-top:16px;border-top:1px solid var(--line);font-size:12px;color:var(--muted);}
  .langpick{display:flex;flex-wrap:wrap;gap:10px;margin:30px 0;}
  .langpick a{text-decoration:none;color:var(--sea);border:1px solid var(--line);border-radius:10px;padding:12px 18px;font-weight:600;font-size:15px;background:#fff;}
  .langpick a:hover{border-color:var(--sea);}
  @media(max-width:560px){.card{flex-direction:column;}.cside{flex-direction:row;align-items:center;}.wm{font-size:30px;}}
  /* Gutter ad squares — desktop only, shown when the viewport is wide enough to clear the 840px column */
  .ad-rail{position:fixed;top:150px;width:250px;z-index:5;display:none;}
  .ad-rail.left{left:calc((100vw - 840px) / 2 - 274px);}
  .ad-rail.right{right:calc((100vw - 840px) / 2 - 274px);}
  .ad-slot{display:flex;align-items:center;justify-content:center;width:250px;height:250px;border-radius:10px;overflow:hidden;text-decoration:none;background:#fff;border:1px solid var(--line);box-shadow:0 1px 3px rgba(20,58,78,.06);}
  .ad-slot img{max-width:100%;max-height:100%;object-fit:contain;padding:18px;}
  .ad-slot.house{flex-direction:column;gap:7px;text-align:center;padding:18px;border:2px dashed var(--coral);background:#FAECE7;box-shadow:none;}
  .ad-slot.house .ah-txt{font-size:14px;font-weight:600;color:#993C1D;}
  .ad-slot.house .ah-cta{font-size:11.5px;font-weight:600;color:#993C1D;opacity:.85;}
  .ad-slot.text{flex-direction:column;gap:8px;text-align:center;padding:20px;}
  .ad-slot.text .ad-name{font-family:'Anton',sans-serif;font-size:26px;letter-spacing:.5px;color:#143A4E;line-height:1;}
  .ad-slot.text .ad-sub{font-size:12px;font-weight:500;color:#993C1D;}
  @media(min-width:1400px){.ad-rail{display:block;}}
</style>
