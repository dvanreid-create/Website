<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Prime Membership Status — Málaga Live</title><meta name="robots" content="noindex,nofollow">
<style>@import url("https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;700&display=swap");
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Inter",system-ui,sans-serif;color:#143A4E;background:#eef1f3;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:22px}
.card{background:#fff;border-radius:18px;max-width:430px;width:100%;padding:30px 30px 26px;text-align:center;box-shadow:0 18px 50px rgba(20,40,60,.16)}
.lock{display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:18px}
.bdg{width:34px;height:34px}.ml{font-family:"Anton",sans-serif;font-size:25px;color:#143A4E}
.badge{border-radius:14px;padding:22px 18px;margin:6px 0 14px}
.badge .ico{font-size:40px;line-height:1;margin-bottom:8px}
.badge .st{font-family:"Anton",sans-serif;font-size:26px;letter-spacing:.5px}
.badge .sub{font-size:14px;margin-top:6px;opacity:.92}
.ok{background:#e7f6ec;color:#1b7a3d}
.warn{background:#fdf3e3;color:#b9791b}
.bad{background:#fdecec;color:#b5332b}
.pending{background:#eef2f5;color:#5f6b78}
.venue{font-weight:700;font-size:17px;color:#143A4E;margin-bottom:2px}
.num{font-size:13px;color:#7c8890;letter-spacing:1px;text-transform:uppercase}
.checked{margin-top:16px;font-size:12px;color:#8a949e;border-top:1px solid #eef1f3;padding-top:12px}
.checked b{color:#5f6b78}
.note{margin-top:8px;font-size:11.5px;color:#9aa4ac;line-height:1.5}
</style></head><body>
<div class="card">
  <div class="lock"><svg class="bdg" viewBox="0 0 100 100"><rect x="3" y="3" width="94" height="94" rx="24" fill="#E8662A"/><path d="M41 31 L73 50 L41 69 Z" fill="#fff"/></svg><span class="ml">MÁLAGA LIVE · PRIME</span></div>
  <div id="venue" class="venue"></div>
  <div id="num" class="num"></div>
  <div id="badge" class="badge pending"><div class="ico">…</div><div class="st">Checking…</div><div class="sub"></div></div>
  <div class="checked">Live check · <b id="now"></b></div>
  <div class="note">This page shows live membership status in real time. Partner discounts and benefits apply only while status reads <b>Active</b>.</div>
</div>
<script>
(function(){
  var p=new URLSearchParams(location.search), t=(p.get('t')||'').trim();
  var badge=document.getElementById('badge'), now=document.getElementById('now');
  function stamp(){ now.textContent=new Date().toLocaleString(); }
  stamp(); setInterval(stamp,1000);
  function render(cls,ico,st,sub){ badge.className='badge '+cls; badge.innerHTML='<div class="ico">'+ico+'</div><div class="st">'+st+'</div><div class="sub">'+sub+'</div>'; }
  if(!t){ render('bad','✕','No pass code','Open the link from your membership email.'); return; }
  fetch('/.netlify/functions/prime-status?t='+encodeURIComponent(t),{cache:'no-store'})
   .then(function(r){return r.json();})
   .then(function(d){
     if(!d.ok){ render('bad','✕','Not found','This pass code is not recognised.'); return; }
     document.getElementById('venue').textContent=d.venue||'';
     document.getElementById('num').textContent = d.ref ? ('Prime Member · '+d.ref) : 'Prime Member';
     var s=(d.status||'').toLowerCase();
     if(s==='active') render('ok','✓','ACTIVE','Prime membership in good standing.');
     else if(s==='paused') render('warn','⏸','PAUSED','Benefits suspended until payment resumes.');
     else if(s==='requested'||s==='approved') render('pending','◷','Pending activation','Membership not active yet.');
     else render('bad','✕','Not active','This membership is not currently active.');
   })
   .catch(function(){ render('bad','!','Couldn’t check','Please try again in a moment.'); });
})();
</script>
</body></html>
