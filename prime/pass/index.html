<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Málaga Live Prime — Membership Card</title>
<meta name="robots" content="noindex,nofollow">
<link rel="manifest" href="/prime/pass/manifest.json">
<meta name="theme-color" content="#0B5E8A">
<link rel="apple-touch-icon" href="/prime/pass/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ML Prime">
<style>@import url("https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;700&display=swap");
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Inter",system-ui,sans-serif;color:#143A4E;background:#0B5E8A;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px;padding-top:max(18px,env(safe-area-inset-top))}
.card{background:#fff;border-radius:20px;max-width:420px;width:100%;padding:26px 24px 22px;text-align:center;box-shadow:0 18px 50px rgba(0,0,0,.28)}
.lock{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px}
.bdg{width:30px;height:30px}.ml{font-family:"Anton",sans-serif;font-size:22px;color:#143A4E;letter-spacing:.3px}
.venue{font-weight:700;font-size:18px;color:#143A4E;margin-bottom:2px}
.lbl{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#8a949e;margin-top:14px}
.num{font-family:"Anton",sans-serif;font-size:30px;color:#0B5E8A;letter-spacing:1px;word-break:break-all;margin-top:2px}
.badge{border-radius:13px;padding:14px;margin:16px 0 6px}
.badge .ico{font-size:30px;line-height:1}.badge .st{font-family:"Anton",sans-serif;font-size:22px;letter-spacing:.5px;margin-top:2px}.badge .sub{font-size:12.5px;margin-top:4px;opacity:.9}
.ok{background:#e7f6ec;color:#1b7a3d}.warn{background:#fdf3e3;color:#b9791b}.bad{background:#fdecec;color:#b5332b}.pending{background:#eef2f5;color:#5f6b78}
.qr{margin:14px auto 4px;width:184px;height:184px;display:flex;align-items:center;justify-content:center;border:1px solid #eef1f3;border-radius:12px;overflow:hidden}
.qr img{width:100%;height:100%}
.hint{font-size:11.5px;color:#8a949e;line-height:1.5;margin-top:6px}
.hint b{color:#5f6b78}
.checked{margin-top:12px;font-size:11px;color:#aab2b9}
.form{margin-top:8px}
.form input{width:100%;font-size:15px;padding:11px 12px;border:1px solid #cfd8dd;border-radius:10px;text-align:center;text-transform:uppercase;letter-spacing:1px;color:#143A4E}
.form button{margin-top:10px;width:100%;background:#E8662A;color:#fff;border:0;border-radius:10px;padding:12px;font-weight:700;font-size:15px;font-family:inherit;cursor:pointer}
.install{margin-top:14px;background:#f4f8fa;border:1px dashed #cfd8dd;border-radius:12px;padding:12px 14px;font-size:12.5px;color:#54636b;line-height:1.5;text-align:left;display:none}
.install b{color:#0B5E8A}
.install .instbtn{margin:10px 0 4px;width:100%;background:#0B5E8A;color:#fff;border:0;border-radius:9px;padding:11px;font-weight:700;font-size:14px;font-family:inherit;cursor:pointer}
</style></head><body>
<div class="card">
  <div class="lock"><svg class="bdg" viewBox="0 0 100 100"><rect x="3" y="3" width="94" height="94" rx="24" fill="#E8662A"/><path d="M41 31 L73 50 L41 69 Z" fill="#fff"/></svg><span class="ml">MÁLAGA LIVE · PRIME</span></div>

  <div id="content" style="display:none">
    <div id="venue" class="venue"></div>
    <div id="lbl_num" class="lbl">Member number</div>
    <div id="num" class="num">…</div>

    <div id="badge" class="badge pending"><div class="ico">…</div><div class="st">…</div><div class="sub"></div></div>

    <div class="qr"><img id="qr" alt="Membership QR"></div>
    <div id="hint" class="hint"></div>
    <div class="checked"><span id="lbl_live">Live check</span> · <b id="now"></b></div>

    <div id="install" class="install">
      <b id="inst_keep">Keep this handy — install it</b>
      <button id="instbtn" class="instbtn" style="display:none" onclick="doInstall()">⬇ <span id="inst_btn">Install Málaga Live Prime</span></button>
      <div id="insttext" style="margin-top:6px"></div>
    </div>
  </div>

  <div id="entry" class="form" style="display:none">
    <div id="lbl_enter" class="lbl" style="margin-top:6px">Enter your member number</div>
    <input id="codein" placeholder="ML-PRIME-XXXXXX" autocomplete="off">
    <button id="btn_view" onclick="useCode()">View my card</button>
    <div id="hint_entry" class="hint" style="margin-top:10px">It's on your welcome email and on every bank payment (your reference).</div>
  </div>
</div>

     active:["ACTIVO","Membresía al corriente."],paused:["EN PAUSA","Beneficios suspendidos hasta reanudar el pago."],
     pending:["Activación pendiente","Activo en cuanto llegue tu primer pago."],inactive:["No activo","Esta membresía no está activa."],
     notfound:["No encontrado","Revisa tu número de miembro."],err:["No se pudo verificar","Inténtalo de nuevo en un momento."]},

     hintEntry:"Sie steht in Ihrer Willkommens-E-Mail und auf jeder Bankzahlung (Ihre Referenz).",
     instIOS:"Auf iPhone/iPad: tippen Sie auf <b>Teilen</b> ▸ <b>Zum Home-Bildschirm</b>.",
     instOther:"Tippen Sie auf die Schaltfläche oben — oder nutzen Sie die <b>Installieren</b>-Option Ihres Browsers (das Symbol in der Adressleiste oder das <b>⋮</b>-Menü ▸ <b>Installieren</b>).",
     active:["AKTIV","Mitgliedschaft in Ordnung."],paused:["PAUSIERT","Vorteile ausgesetzt, bis die Zahlung fortgesetzt wird."],
     pending:["Aktivierung ausstehend","Aktiv, sobald Ihre erste Zahlung eingeht."],inactive:["Nicht aktiv","Diese Mitgliedschaft ist nicht aktiv."],
     notfound:["Nicht gefunden","Überprüfen Sie Ihre Mitgliedsnummer."],err:["Prüfung fehlgeschlagen","Versuchen Sie es gleich erneut."]},
 fr:{num:"Numéro de membre",live:"Vérification en direct",keep:"Gardez-le à portée — installez-le",instbtn:"Installer Málaga Live Prime",
     enter:"Saisissez votre numéro de membre",view:"Voir ma carte",
     hint:"<b>En personne :</b> montrez ce QR — les partenaires le scannent pour confirmer que vous êtes actif.<br><b>En ligne :</b> saisissez votre numéro de membre aux caisses partenaires.",
     hintEntry:"Il figure dans votre e-mail de bienvenue et sur chaque paiement bancaire (votre référence).",
     instIOS:"Sur iPhone/iPad : touchez <b>Partager</b> ▸ <b>Sur l’écran d’accueil</b>.",
     instOther:"Touchez le bouton ci-dessus — ou utilisez l’option <b>Installer</b> de votre navigateur (l’icône dans la barre d’adresse, ou le menu <b>⋮</b> ▸ <b>Installer</b>).",
     active:["ACTIF","Adhésion en règle."],paused:["EN PAUSE","Avantages suspendus jusqu’à la reprise du paiement."],
     pending:["Activation en attente","Actif dès réception de votre premier paiement."],inactive:["Non actif","Cette adhésion n’est pas active."],
     notfound:["Introuvable","Vérifiez votre numéro de membre."],err:["Échec de la vérification","Réessayez dans un instant."]},
 sv:{num:"Medlemsnummer",live:"Live-kontroll",keep:"Ha den nära — installera den",instbtn:"Installera Málaga Live Prime",
     enter:"Ange ditt medlemsnummer",view:"Visa mitt kort",
     hint:"<b>På plats:</b> visa denna QR — partner skannar den för att bekräfta att du är aktiv.<br><b>Online:</b> ange ditt medlemsnummer i partnernas kassor.",
     hintEntry:"Det finns i ditt välkomstmejl och på varje bankbetalning (din referens).",
     instIOS:"På iPhone/iPad: tryck på <b>Dela</b> ▸ <b>Lägg till på hemskärmen</b>.",
     instOther:"Tryck på knappen ovan — eller använd webbläsarens <b>Installera</b>-alternativ (ikonen i adressfältet, eller <b>⋮</b>-menyn ▸ <b>Installera</b>).",
     active:["AKTIV","Medlemskapet är i ordning."],paused:["PAUSAD","Förmåner pausade tills betalningen återupptas."],
     pending:["Väntar på aktivering","Aktiv när din första betalning kommer in."],inactive:["Inte aktiv","Detta medlemskap är inte aktivt."],
     notfound:["Hittades inte","Kontrollera ditt medlemsnummer."],err:["Kunde inte kontrollera","Försök igen om en stund."]},

     enter:"Skriv inn medlemsnummeret ditt",view:"Vis kortet mitt",
     hint:"<b>På stedet:</b> vis denne QR-koden — partnere skanner den for å bekrefte at du er aktiv.<br><b>På nett:</b> skriv inn medlemsnummeret ditt i partnernes kasser.",
     hintEntry:"Det står i velkomst-e-posten din og på hver bankbetaling (din referanse).",
     instIOS:"På iPhone/iPad: trykk på <b>Del</b> ▸ <b>Legg til på Hjem-skjerm</b>.",
     instOther:"Trykk på knappen ovenfor — eller bruk nettleserens <b>Installer</b>-alternativ (ikonet i adresselinjen, eller <b>⋮</b>-menyen ▸ <b>Installer</b>).",
     active:["AKTIV","Medlemskapet er i orden."],paused:["SATT PÅ PAUSE","Fordeler suspendert til betalingen gjenopptas."],
     pending:["Venter på aktivering","Aktiv så snart din første betaling kommer inn."],inactive:["Ikke aktiv","Dette medlemskapet er ikke aktivt."],
     notfound:["Ikke funnet","Sjekk medlemsnummeret ditt."],err:["Kunne ikke sjekke","Prøv igjen om et øyeblikk."]},
 da:{num:"Medlemsnummer",live:"Live-tjek",keep:"Hav det ved hånden — installer det",instbtn:"Installer Málaga Live Prime",
     enter:"Indtast dit medlemsnummer",view:"Vis mit kort",
     hint:"<b>Personligt:</b> vis denne QR-kode — partnere scanner den for at bekræfte, at du er aktiv.<br><b>Online:</b> indtast dit medlemsnummer ved partnernes kasser.",
     hintEntry:"Det står i din velkomst-e-mail og på hver bankbetaling (din reference).",

 fi:{num:"Jäsennumero",live:"Live-tarkistus",keep:"Pidä se käsillä — asenna se",instbtn:"Asenna Málaga Live Prime",
     enter:"Anna jäsennumerosi",view:"Näytä korttini",
     hint:"<b>Paikan päällä:</b> näytä tämä QR-koodi — kumppanit skannaavat sen vahvistaakseen, että olet aktiivinen.<br><b>Verkossa:</b> anna jäsennumerosi kumppaneiden kassoilla.",
     hintEntry:"Se on tervetulosähköpostissasi ja jokaisessa pankkimaksussa (viitteesi).",
     instIOS:"iPhonessa/iPadissa: napauta <b>Jaa</b> ▸ <b>Lisää Koti-valikkoon</b>.",
     instOther:"Napauta yllä olevaa painiketta — tai käytä selaimesi <b>Asenna</b>-vaihtoehtoa (osoitepalkin kuvake tai <b>⋮</b>-valikko ▸ <b>Asenna</b>).",

     notfound:["Ei löytynyt","Tarkista jäsennumerosi."],err:["Tarkistus epäonnistui","Yritä hetken kuluttua uudelleen."]}
};
function pickLang(l){ l=(l||"").toLowerCase(); return STR[l]?l:"en"; }

(function(){
  var KEY="mlprimecard";
  var p=new URLSearchParams(location.search);
  var t=(p.get("t")||"").trim(), code=(p.get("code")||"").trim();
  var urlLang=(p.get("lang")||"").toLowerCase();
  if(t){ localStorage.setItem(KEY, JSON.stringify({t:t})); }
  else if(code){ localStorage.setItem(KEY, JSON.stringify({code:code})); }
  else { try{ var s=JSON.parse(localStorage.getItem(KEY)||"null"); if(s){ t=s.t||""; code=s.code||""; } }catch(e){} }

  // Initial UI language: ?lang param, then en. Refined once prime-status returns
  // the member's stored language.
  var L = pickLang(urlLang || "en");
  function applyStatic(L){
    var T=STR[L];
    document.documentElement.lang=L;
    var set=function(id,html){ var e=document.getElementById(id); if(e) e.innerHTML=html; };
    set("lbl_num",T.num); set("lbl_live",T.live); set("inst_keep",T.keep); set("inst_btn",T.instbtn);
    set("lbl_enter",T.enter); set("btn_view",T.view); set("hint",T.hint); set("hint_entry",T.hintEntry);
  }
  applyStatic(L);

  var elContent=document.getElementById("content"), elEntry=document.getElementById("entry");
  var now=document.getElementById("now");
  function stamp(){ if(now) now.textContent=new Date().toLocaleString(); }

  if(!t && !code){ elEntry.style.display="block"; return; }
  elContent.style.display="block"; stamp(); setInterval(stamp,1000);

  var qs = t ? ("t="+encodeURIComponent(t)) : ("code="+encodeURIComponent(code));
  var verifyUrl = location.origin + "/prime/pass/?" + qs;
  document.getElementById("qr").src = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&margin=0&data=" + encodeURIComponent(verifyUrl);

  function render(cls,ico,st,sub){ var b=document.getElementById("badge"); b.className="badge "+cls; b.innerHTML='<div class="ico">'+ico+'</div><div class="st">'+st+'</div><div class="sub">'+sub+'</div>'; }

  function showInstall(L){
    var T=STR[L];
    var standalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone===true;
    if(!standalone){
      document.getElementById("install").style.display="block";
      var isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
      document.getElementById("insttext").innerHTML = isIOS ? T.instIOS : T.instOther;
    }
  }

  fetch("/.netlify/functions/prime-status?"+qs,{cache:"no-store"})
    .then(function(r){return r.json();})
    .then(function(d){
      // Prefer the member's stored language; else keep the URL/default one.
      if(d && d.lang){ L=pickLang(d.lang); applyStatic(L); }
      var T=STR[L];
      if(!d.ok){ document.getElementById("num").textContent="—"; render("bad","✕",T.notfound[0],T.notfound[1]); showInstall(L); return; }
      document.getElementById("venue").textContent=d.venue||"";
      document.getElementById("num").textContent=d.ref||code||"";
      var st=(d.status||"").toLowerCase();
      if(st==="active") render("ok","✓",T.active[0],T.active[1]);
      else if(st==="paused") render("warn","⏸",T.paused[0],T.paused[1]);
      else if(st==="requested"||st==="approved") render("pending","◷",T.pending[0],T.pending[1]);
      else render("bad","✕",T.inactive[0],T.inactive[1]);
      showInstall(L);
    })
    .catch(function(){ var T=STR[L]; render("bad","!",T.err[0],T.err[1]); showInstall(L); });

  if("serviceWorker" in navigator){ navigator.serviceWorker.register("/prime/pass/sw.js").catch(function(){}); }
})();
var deferredPrompt=null;
window.addEventListener("beforeinstallprompt", function(e){ e.preventDefault(); deferredPrompt=e; var b=document.getElementById("instbtn"); if(b) b.style.display="block"; });
function doInstall(){ if(deferredPrompt){ deferredPrompt.prompt(); deferredPrompt.userChoice.finally(function(){ deferredPrompt=null; var b=document.getElementById("instbtn"); if(b) b.style.display="none"; }); } }
function useCode(){ var v=(document.getElementById("codein").value||"").trim().toUpperCase(); if(!v)return; if(v.indexOf("ML-PRIME-")!==0) v="ML-PRIME-"+v.replace(/^ML-?PRIME-?/i,""); location.search="?code="+encodeURIComponent(v); }
</script>
</body></html>
