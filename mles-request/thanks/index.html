<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Gracias · Thanks · Málaga Live</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap">
<style>
  body{font-family:Inter,system-ui,sans-serif;margin:0;background:#f3f5f7;color:#143A4E;display:flex;min-height:100vh;align-items:center;justify-content:center;padding:24px;}
  .card{background:#fff;border:1px solid #e2e6ea;border-radius:18px;max-width:460px;width:100%;padding:38px 32px;text-align:center;box-shadow:0 14px 40px rgba(20,40,60,.10);}
  img{height:42px;margin-bottom:20px}
  .tick{width:60px;height:60px;border-radius:50%;background:#1F9E63;display:flex;align-items:center;justify-content:center;margin:0 auto 18px}
  .tick svg{width:30px;height:30px}
  h1{font-family:Anton,sans-serif;font-weight:400;letter-spacing:.5px;font-size:26px;margin:0 0 10px}
  p{font-size:15px;line-height:1.55;color:#36434f;margin:0 0 10px}
  .muted{color:#5f6b78;font-size:13.5px}
  a.btn{display:inline-block;margin-top:18px;text-decoration:none;font-weight:600;color:#fff;background:#0B5E8A;padding:12px 22px;border-radius:10px}
</style>
</head>
<body>
  <div class="card">
    <img src="https://malagalivepulse.com/assets/malaga-live-logo.png" alt="Málaga Live">
    <div class="tick"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>
    <h1>¡GRACIAS! · THANK YOU</h1>
    <p>Hemos recibido tu solicitud y tu pago. Tu <b>Demand Read</b> (informe MLES) llegará a tu email en un plazo de <b>24 h</b>.</p>
    <p class="muted">We've received your request and payment. Your Demand Read (MLES report) will arrive by email within 24h.</p>
    <a class="btn" href="https://malagalivepulse.com/es/">Volver a Málaga Live · Back to Málaga Live</a>
  </div>
</body>
</html>
